services:
  mongo:
    image: mongo:7
    container_name: harmony-mongo
    command: ["--bind_ip_all", "--auth"]
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      - MONGO_INITDB_DATABASE=${MONGO_APP_DATABASE:-harmony}
      - MONGO_APP_USERNAME=${MONGO_APP_USERNAME:?MONGO_APP_USERNAME is required}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
    volumes:
      - /www/web/v_touchmagic_cn/harmony/server/mongo-data:/data/db
      - ./server/mongo-init/01-create-app-user.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet --host 127.0.0.1 --port 27017 -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - harmony-backend
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: harmony-server
    env_file:
      - ./server/.env.production
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000" # 仅允许宿主机本地访问；通过 Nginx/反向代理对外暴露
    volumes:
      - /www/web/v_touchmagic_cn/harmony/server/uploads:/app/uploads
      - ./server/.env.production:/app/server/.env.production:ro
    networks:
      - harmony-backend
      - default
    restart: unless-stopped

  server-seed:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - ./server/.env.production
    depends_on:
      mongo:
        condition: service_healthy
    command: ["node", "dist/scripts/seed.js"]
    profiles:
      - ops
    networks:
      - harmony-backend
    restart: "no"

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: harmony-admin
    depends_on:
      - server
    ports:
      - "127.0.0.1:8087:80" # 仅允许宿主机本地访问；通过反向代理对外暴露
    volumes:
      - type: bind
        source: /www/web/v_touchmagic_cn/harmony/config/admin-app-config.js
        target: /usr/share/nginx/html/_app.config.js
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

  editor:
    build:
      context: .
      dockerfile: editor/Dockerfile
    container_name: harmony-editor
    depends_on:
      - server
    ports:
      - "127.0.0.1:8088:80" # 仅允许宿主机本地访问；通过反向代理对外暴露
    volumes:
      - type: bind
        source: /www/web/v_touchmagic_cn/harmony/config/editor-app-config.json
        target: /usr/share/nginx/html/config/app-config.json
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: harmony-mongo-express
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin      # 可选，设置 Web 界面登录
      ME_CONFIG_BASICAUTH_PASSWORD: admin123   # 可选，设置 Web 界面密码
    ports:
      - "127.0.0.1:8181:8081"   # 仅本机访问
    networks:
      - harmony-backend
      - default  # 允许与宿主机及外部通信
    restart: unless-stopped

networks:
  harmony-backend:
    internal: true
