x-build-root: &root-build
  context: .

services:
  mongo:
    image: mongo:7
    container_name: harmony-mongo
    command: ["--bind_ip_all", "--auth"]
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      - MONGO_INITDB_DATABASE=${MONGO_APP_DATABASE:-harmony}
      - MONGO_APP_USERNAME=${MONGO_APP_USERNAME:?MONGO_APP_USERNAME is required}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
    volumes:
      - /www/web/v_touchmagic_cn/harmony/server/mongo-data:/data/db
      - ./server/mongo-init/01-create-app-user.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet --host 127.0.0.1 --port 27017 -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - harmony-backend
    restart: unless-stopped

  server:
    build:
      <<: *root-build
      dockerfile: server/Dockerfile
    image: harmony-server
    container_name: harmony-server
    env_file:
      - ./server/.env.production
    environment:
      MONGODB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/${MONGO_APP_DATABASE:-harmony}?authSource=${MONGO_APP_DATABASE:-harmony}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - /www/web/v_touchmagic_cn/harmony/server/uploads:/app/uploads
      - ./server/.env.production:/app/server/.env.production:ro
    networks:
      - harmony-backend
      - default
    restart: unless-stopped

  server-seed:
    build:
      <<: *root-build
      dockerfile: server/Dockerfile
    image: harmony-server
    env_file:
      - ./server/.env.production
    environment:
      MONGODB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/${MONGO_APP_DATABASE:-harmony}?authSource=${MONGO_APP_DATABASE:-harmony}
    depends_on:
      mongo:
        condition: service_healthy
    command: ["node", "dist/scripts/seed.js"]
    profiles:
      - ops
    networks:
      - harmony-backend
    restart: "no"

  mongo-fix-auth:
    build:
      <<: *root-build
      dockerfile: server/Dockerfile
    image: harmony-server
    entrypoint: ["node"]
    env_file:
      - ./server/.env.production
    environment:
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE:-harmony}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:?MONGO_APP_USERNAME is required}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
    depends_on:
      mongo:
        condition: service_healthy
    command: ["dist/scripts/fix-mongo-auth.js"]
    profiles:
      - ops
    networks:
      - harmony-backend
    restart: "no"

  admin:
    build:
      <<: *root-build
      dockerfile: admin/Dockerfile
    image: harmony-admin
    container_name: harmony-admin
    depends_on:
      - server
    ports:
      - "127.0.0.1:8087:80"
    volumes:
      - type: bind
        source: /www/web/v_touchmagic_cn/harmony/config/admin-app-config.js
        target: /usr/share/nginx/html/_app.config.js
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

  editor:
    build:
      <<: *root-build
      dockerfile: editor/Dockerfile
    image: harmony-editor
    container_name: harmony-editor
    depends_on:
      - server
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - type: bind
        source: /www/web/v_touchmagic_cn/harmony/config/editor-app-config.json
        target: /usr/share/nginx/html/config/app-config.json
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: harmony-mongo-express
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "127.0.0.1:8181:8081"
    networks:
      - harmony-backend
      - default
    restart: unless-stopped

networks:
  harmony-backend:
    internal: true
