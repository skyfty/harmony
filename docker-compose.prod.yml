services:
  mongo:
    image: mongo:7
    container_name: harmony-mongo
    command: ["--bind_ip_all"]
    ports:
      - "27018:27017" # 将宿主机的 27018 转发到容器内默认 27017，避免与现有服务冲突
    environment:
      - MONGO_INITDB_DATABASE=harmony
    volumes:
      - /www/web/v_touchmagic_cn/harmony/server/mongo-data:/data/db
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: harmony-server
    env_file:
      - ./server/.env.production
    depends_on:
      - mongo
    ports:
      - "4000:4000" # 可选：仅用于本机调试；线上建议通过 Nginx/反向代理暴露域名
    volumes:
      - /www/web/v_touchmagic_cn/harmony/server/uploads:/app/uploads
      - ./server/.env.production:/app/server/.env.production:ro
    restart: unless-stopped

  server-seed:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - ./server/.env.production
    depends_on:
      - mongo
    command: ["node", "dist/scripts/seed.js"]
    profiles:
      - ops
    restart: "no"

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: harmony-admin
    depends_on:
      - server
    ports:
      - "8087:80" # 通过反向代理映射到 http://v.touchmagic.cn
    volumes:
      - type: bind
        source: /www/web/v_touchmagic_cn/harmony/config/admin-app-config.js
        target: /usr/share/nginx/html/_app.config.js
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

  editor:
    build:
      context: .
      dockerfile: editor/Dockerfile
    container_name: harmony-editor
    depends_on:
      - server
    ports:
      - "8088:80" # 通过反向代理映射到 http://editor.v.touchmagic.cn
    volumes:
      - type: bind
        source: /www/web/v_touchmagic_cn/harmony/config/editor-app-config.json
        target: /usr/share/nginx/html/config/app-config.json
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped
